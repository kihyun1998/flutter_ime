name: CI

on:
  push:
    branches: [main]
  pull_request:

# Pinned so CI does not drift with the runner's default Flutter.
env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  # The package itself. No Flutter: flutter_ime is a plain Dart package as of
  # 3.0.0, and running its own suite through Flutter would hide a dependency on
  # it creeping back in.
  dart:
    name: Dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1

      - run: dart --version

      - name: Install dependencies
        run: dart pub get

      # Everything, including the example. Formatting needs no resolved
      # dependencies, so the example is checked here rather than in the jobs
      # that have Flutter.
      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

  # A consumer that has no Flutter at all must be able to resolve, analyse and
  # run against this package. That is a headline promise of 3.0.0 and nothing
  # else in CI would notice it breaking — the suite above passes just as well
  # with a Flutter dependency present.
  plain-dart-consumer:
    name: Plain Dart consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: flutter_ime

      - uses: dart-lang/setup-dart@v1

      - name: Build a consumer that depends on the package by path
        run: |
          mkdir -p consumer/bin
          cat > consumer/pubspec.yaml <<'EOF'
          name: plain_dart_consumer
          publish_to: none
          environment:
            sdk: ">=3.4.0 <4.0.0"
          dependencies:
            flutter_ime:
              path: ../flutter_ime
          EOF
          cat > consumer/bin/main.dart <<'EOF'
          import 'package:flutter_ime/flutter_ime.dart';

          Future<void> main() async {
            // Linux, so every call takes the gating path and returns its
            // documented default. Reaching the end without throwing is the
            // assertion.
            await setEnglishKeyboard();
            await isEnglishKeyboard();
            await getCurrentInputSource();
            await setInputSource('anything');
            await disableIME();
            await enableIME();
            await isCapsLockOn();
            print('ok');
          }
          EOF

      - name: Resolve, analyse and run
        working-directory: consumer
        run: |
          dart pub get
          dart analyze
          dart run bin/main.dart

  # The example app is a Flutter app, so these jobs do need Flutter. They are
  # smoke tests: the package contributes no native build step any more, so what
  # is being checked is that a consumer app still builds with it in the
  # dependency graph.
  example-web:
    name: Example (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # `dart:ffi` does not exist on web, so a stray unconditional import would
      # break every consumer who also targets web — and nothing else here would
      # catch it. Building the example exercises the real conditional import.
      - name: Build example for web
        working-directory: example
        run: |
          flutter pub get
          flutter build web

  example-windows:
    name: Example (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build example (Windows)
        working-directory: example
        run: |
          flutter pub get
          flutter build windows --debug

  example-macos:
    name: Example (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build example (macOS)
        working-directory: example
        run: |
          flutter pub get
          flutter build macos --debug
