name: CI

on:
  push:
    branches: [main]
  pull_request:

# Pinned so CI does not drift with the runner's default Flutter.
env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  dart:
    name: Dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # The package must stay importable from an app that also targets web.
      # `dart:ffi` does not exist there, so a stray unconditional import would
      # break every such consumer's build — and nothing else in CI would catch
      # it. Building the example exercises the real conditional import, since
      # the example imports the FFI entry point.
      - name: Build example for web
        working-directory: example
        run: flutter build web

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # The gtest harness compiles the managers + method dispatch, which link the
      # Flutter C++ client wrapper from the cached Windows engine artifacts.
      - name: Precache Windows engine artifacts
        run: flutter precache --windows

      # Unit-test the plugin's pure logic and method-call dispatch via the
      # standalone GoogleTest harness.
      - name: Build and run C++ unit tests
        run: |
          cmake -S windows/test -B build/win-test -G "Visual Studio 17 2022" -A x64
          cmake --build build/win-test --config Debug
          ctest --test-dir build/win-test -C Debug --output-on-failure

      # Building the example compiles and links the full C++ plugin (managers,
      # WndProc subclass hook, IMM32/comctl32 usage).
      - name: Build example (Windows)
        working-directory: example
        run: flutter build windows --debug

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Building the example compiles the Swift managers (InputSourceManager /
      # CapsLockManager). Must run before xcodebuild so the generated
      # Flutter/ephemeral files exist.
      - name: Build example (macOS)
        working-directory: example
        run: flutter build macos --debug

      # Run the XCTest target (RunnerTests), which unit-tests the pure Swift
      # classification helpers via `@testable import flutter_ime`.
      - name: Run XCTest
        working-directory: example
        run: |
          xcodebuild test \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
