name: flutter_ime
description: "Control IME (Input Method Editor) state from Dart. Switch to an English keyboard, detect input source changes, and monitor Caps Lock on Windows and macOS — with no native code and no build step."
version: 2.1.4
homepage: "https://github.com/kihyun1998/flutter_ime"
repository: https://github.com/kihyun1998/flutter_ime
topics:
  - ime
  - keyboard
  - input-method
  - windows
  - macos

environment:
  # 3.1.0 brought NativeCallable, which is how the macOS input-source
  # notification observer is bridged; 3.4.0 brought its `keepIsolateAlive`
  # setter, which that observer needs. It is never closed — closing it races
  # with deliveries already queued — and a listener callable that is never
  # closed would otherwise hold the isolate open forever, so a plain Dart CLI
  # using this package could not exit. Nothing else in the package needs 3.4.
  #
  # No `flutter` constraint. Declaring one would make Flutter a requirement for
  # anyone resolving this package, which is exactly what this version removes.
  sdk: ">=3.4.0 <4.0.0"

# Declared rather than inferred.
#
# Windows and macOS do the work. Web is listed because "adding this package does
# not break your web build" is a promise worth making — it imports `dart:ffi`,
# which does not exist there, and the conditional import that keeps the build
# green is a feature rather than an accident.
#
# Android, iOS and Linux are deliberately absent. The package is *safe* on them
# — every function short-circuits in the gating layer and returns its documented
# default — but safe is not supported, and a reader scanning pub.dev takes these
# for a capability list. Someone looking for an Android IME package should not
# find this one.
platforms:
  macos:
  web:
  windows:

dependencies:
  ffi: ^2.1.0
  meta: ^1.9.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  fake_async: ^1.3.1
  lints: ^4.0.0
  test: ^1.24.0
