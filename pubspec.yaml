name: flutter_ime
description: "A Flutter plugin for controlling IME (Input Method Editor) state. Switch to English keyboard, detect input source changes, and monitor Caps Lock state on Windows and macOS."
version: 2.1.4
homepage: "https://github.com/kihyun1998/flutter_ime"
repository: https://github.com/kihyun1998/flutter_ime
topics:
  - ime
  - keyboard
  - input-method
  - windows
  - macos

environment:
  # 3.1.0 brought NativeCallable, which is how the macOS input-source
  # notification observer is bridged; 3.4.0 brought its `keepIsolateAlive`
  # setter, which that observer needs. It is never closed — closing it races
  # with deliveries already queued — and a listener callable that is never
  # closed would otherwise hold the isolate open forever, so a plain Dart CLI
  # using this package could not exit. Nothing else in the package needs 3.4.
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  fake_async: ^1.3.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: FlutterImePluginCApi
      macos:
        pluginClass: FlutterImePlugin
